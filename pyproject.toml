[tool.poetry]
name = "GCAPI Backend"
version = "0.0.1"
description = ""
authors = ["Joey Grable <hello@joeygrable.com>"]
license = "Private"

[tool.poetry.dependencies]
python = "^3.10"
uvicorn = {version = "0.18.2", extras = ["standard"]}
greenlet = "1.1.2"
requests = "^2.28.1"
cryptography = "37.0.2"
fastapi = "0.79.0"
pydantic = {version = "1.9.1", extras = ["email"]}
python-multipart = "0.0.5"
celery = "5.2.7"
celery-stubs = "0.1.2"
redis = "4.3.4"
PyMySQL = "1.0.2"
SQLAlchemy = {version = "1.4.39", extras = ["mypy"]}
sqlalchemy-stubs = "0.4"
SQLAlchemy-Utils = "0.38.2"
databases = "0.5.5"
alembic = "1.8.1"
anyio = {version = "3.5.0", extras = ["trio"]}
asyncio = "3.4.3"
aiohttp = "3.8.1"
aiosqlite = "0.17.0"
aiomysql = "0.1.1"
aiofiles = "0.8.0"
email-validator = "1.1.3"
emails = "0.6"
Jinja2 = "3.1.2"
python-dotenv = "0.20.0"
bcrypt = "^3.2.2"
passlib = "^1.7.4"
PyJWT = "^2.4.0"

[tool.poetry.dev-dependencies]
asgi-lifespan = "1.0.1"
httpx = "0.23.0"
httpx-oauth = "0.8.0"
pytest = "7.1.2"
pytest-asyncio = "0.18.3"
pytest-cov = "3.0.0"
pytest-mock = "3.8.2"
pytest-random-order = "1.0.4"
autopep8 = "1.6.0"
pep8 = "1.7.1"
mypy = "0.971"
isort = "5.10.1"
black = "22.3.0"
flake8 = "4.0.1"
autoflake = "1.4"
makefun = "^1.14.0"

[tool.isort]
profile = "black"
src_paths = ["app"]
combine_as_imports = true
line_length = 88

[tool.black]
profile = "black"
src_paths = ["app"]
combine_as_imports = true
line_length = 88

[tool.mypy]
python_version = 3.10
ignore_missing_imports = false
disallow_untyped_defs = true
plugins = '''
    pydantic.mypy,
    sqlalchemy.ext.mypy.plugin,
    sqlmypy
'''

[tool.autoflake]
addopts = '''
    --remove-all-unused-imports
    --recursive
    --remove-unused-variables
    --in-place
    --exclude=__init__.py
'''

[tool.flake8]
max-line-length = 88
exclude = '''
    .git,
    __pycache__,
    .mypy_cache,
    .pytest_cache
'''

[tool.pytest.ini_options]
testpaths = "tests"
filterwarnings = "error"
addopts = '''
    --cov-config=.coveragerc
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --no-cov-on-fail
    --asyncio-mode=auto
    app/tests
'''

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
